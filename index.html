<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ClockWork - AI fitness coaching that replaces your $150/month trainer for just $9.99. Personal AI coach that learns YOUR body.">
    <meta name="theme-color" content="#f97316">
    <title>ClockWork - AI Fitness Coaching</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ClockWork">

    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clockwork: {
                            orange: '#f97316',
                            dark: '#0a0a0a',
                            darker: '#050505'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .glow { box-shadow: 0 0 30px rgba(249, 115, 22, 0.3); }
        .glow-text { text-shadow: 0 0 20px rgba(249, 115, 22, 0.5); }
        .card-hover:hover { transform: translateY(-2px); transition: all 0.3s; }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }
            50% { box-shadow: 0 0 40px rgba(249, 115, 22, 0.6); }
        }
        .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .progress-ring { transform: rotate(-90deg); }
        .chat-bubble { max-width: 85%; }
        .workout-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .workout-card:active { transform: scale(0.98); }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #f97316;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ═══════════════════════════════════════════════════════════
        // API CONFIGURATION
        // ═══════════════════════════════════════════════════════════
        const API_URL = 'https://cwbackend-production-314e.up.railway.app/api';

        const api = {
            async fetch(endpoint, options = {}) {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}${endpoint}`, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token && { 'Authorization': `Bearer ${token}` }),
                        ...options.headers
                    }
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Request failed');
                return data;
            },
            get: (endpoint) => api.fetch(endpoint),
            post: (endpoint, body) => api.fetch(endpoint, { method: 'POST', body: JSON.stringify(body) }),
            put: (endpoint, body) => api.fetch(endpoint, { method: 'PUT', body: JSON.stringify(body) })
        };

        // ═══════════════════════════════════════════════════════════
        // MAIN APP COMPONENT
        // ═══════════════════════════════════════════════════════════
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('loading'); // loading, auth, onboarding, app

            useEffect(() => {
                checkAuth();
            }, []);

            const checkAuth = async () => {
                const token = localStorage.getItem('token');
                if (!token) {
                    setLoading(false);
                    setView('auth');
                    return;
                }
                try {
                    const data = await api.get('/users/profile');
                    const userData = data.user || data.data || data;
                    setUser(userData);
                    // Check if onboarding is complete
                    if (!userData.onboarding?.completed) {
                        setView('onboarding');
                    } else {
                        setView('app');
                    }
                } catch (err) {
                    localStorage.removeItem('token');
                    setView('auth');
                }
                setLoading(false);
            };

            const handleLogin = (userData) => {
                setUser(userData);
                if (!userData.onboarding?.completed) {
                    setView('onboarding');
                } else {
                    setView('app');
                }
            };

            const handleOnboardingComplete = (updatedUser) => {
                setUser(updatedUser);
                setView('app');
            };

            const handleLogout = () => {
                localStorage.removeItem('token');
                setUser(null);
                setView('auth');
            };

            if (loading) return <LoadingScreen />;
            if (view === 'auth') return <AuthScreen onLogin={handleLogin} />;
            if (view === 'onboarding') return <OnboardingFlow user={user} onComplete={handleOnboardingComplete} />;
            return <MainApp user={user} onLogout={handleLogout} />;
        };

        // ═══════════════════════════════════════════════════════════
        // LOADING SCREEN
        // ═══════════════════════════════════════════════════════════
        const LoadingScreen = () => (
            <div className="min-h-screen flex items-center justify-center">
                <div className="text-center">
                    <div className="text-6xl mb-4 animate-float">⚡</div>
                    <div className="text-orange-500 text-xl font-bold glow-text">ClockWork</div>
                </div>
            </div>
        );

        // ═══════════════════════════════════════════════════════════
        // AUTH SCREEN (Login/Signup)
        // ═══════════════════════════════════════════════════════════
        const AuthScreen = ({ onLogin }) => {
            const [isSignup, setIsSignup] = useState(false);
            const [formData, setFormData] = useState({ name: '', email: '', password: '' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    const endpoint = isSignup ? '/auth/register' : '/auth/login';
                    const data = await api.post(endpoint, {
                        ...formData,
                        email: formData.email.toLowerCase().trim(),
                        userType: 'individual' // Default to AI coaching
                    });
                    localStorage.setItem('token', data.token);
                    onLogin(data.user);
                } catch (err) {
                    setError(err.message);
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass rounded-2xl p-8 w-full max-w-md">
                        {/* Logo */}
                        <div className="text-center mb-8">
                            <div className="text-5xl mb-2 animate-float">⚡</div>
                            <h1 className="text-2xl font-bold text-white">ClockWork</h1>
                            <p className="text-gray-400 text-sm mt-1">AI-powered fitness coaching</p>
                        </div>

                        {error && (
                            <div className="bg-red-500/20 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg mb-4">
                                {error}
                            </div>
                        )}

                        <form onSubmit={handleSubmit} className="space-y-4">
                            {isSignup && (
                                <input
                                    type="text"
                                    placeholder="Your Name"
                                    value={formData.name}
                                    onChange={(e) => setFormData({...formData, name: e.target.value})}
                                    className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-orange-500 focus:outline-none"
                                    required
                                />
                            )}
                            <input
                                type="email"
                                placeholder="Email"
                                value={formData.email}
                                onChange={(e) => setFormData({...formData, email: e.target.value})}
                                className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-orange-500 focus:outline-none"
                                required
                            />
                            <input
                                type="password"
                                placeholder="Password"
                                value={formData.password}
                                onChange={(e) => setFormData({...formData, password: e.target.value})}
                                className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-orange-500 focus:outline-none"
                                required
                                minLength={6}
                            />
                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition-all disabled:opacity-50 glow"
                            >
                                {loading ? 'Loading...' : isSignup ? 'Create Account' : 'Sign In'}
                            </button>
                        </form>

                        <div className="mt-6 text-center">
                            <button
                                onClick={() => setIsSignup(!isSignup)}
                                className="text-gray-400 hover:text-orange-500 transition-colors"
                            >
                                {isSignup ? 'Already have an account? Sign In' : "Don't have an account? Sign Up"}
                            </button>
                        </div>

                        <div className="mt-8 text-center text-gray-500 text-xs">
                            AI coaching that costs less than a single session with a human trainer
                        </div>
                    </div>
                </div>
            );
        };

        // ═══════════════════════════════════════════════════════════
        // ONBOARDING FLOW (11 Steps per USER_FLOWS.md)
        // ═══════════════════════════════════════════════════════════
        const OnboardingFlow = ({ user, onComplete }) => {
            const [step, setStep] = useState(1);
            const [data, setData] = useState({
                // Step 1: Basic Info
                firstName: user?.name?.split(' ')[0] || '',
                age: '',
                gender: '',
                weight: '',
                weightUnit: 'lb',
                // Step 2: Primary Goal
                goal: '',
                // Step 3: Experience
                experience: '',
                // Step 4: Training Frequency
                daysPerWeek: 4,
                // Step 5: Session Duration
                sessionDuration: '45-60',
                // Step 6: Equipment
                equipment: [],
                // Step 7: Injuries
                injuries: [],
                injuryOther: '',
                // Step 8: Current Lifts
                squat: '',
                bench: '',
                deadlift: '',
                ohp: '',
                // Step 9: Wearables (skip for now)
            });
            const [loading, setLoading] = useState(false);
            const [generating, setGenerating] = useState(false);

            const totalSteps = 9;
            const progress = (step / totalSteps) * 100;

            const updateData = (key, value) => {
                setData(prev => ({ ...prev, [key]: value }));
            };

            const toggleArrayItem = (key, item) => {
                setData(prev => ({
                    ...prev,
                    [key]: prev[key].includes(item)
                        ? prev[key].filter(i => i !== item)
                        : [...prev[key], item]
                }));
            };

            const nextStep = () => setStep(s => Math.min(s + 1, totalSteps));
            const prevStep = () => setStep(s => Math.max(s - 1, 1));

            const completeOnboarding = async () => {
                setGenerating(true);
                try {
                    // Save profile data
                    await api.post('/onboarding/step/1', {
                        data: {
                            gender: data.gender || 'prefer-not-to-say',
                            currentWeight: parseFloat(data.weight) || 0,
                            unitPreference: data.weightUnit === 'kg' ? 'metric' : 'imperial'
                        }
                    });

                    // Save experience
                    await api.post('/onboarding/step/2', {
                        data: {
                            level: data.experience,
                            primaryDiscipline: 'general-fitness'
                        }
                    });

                    // Save goal
                    await api.post('/onboarding/step/3', {
                        data: {
                            type: data.goal
                        }
                    });

                    // Save schedule
                    await api.post('/onboarding/step/4', {
                        data: {
                            daysPerWeek: data.daysPerWeek,
                            sessionDuration: parseInt(data.sessionDuration.split('-')[0]) || 60
                        }
                    });

                    // Save equipment
                    await api.post('/onboarding/step/5', {
                        data: {
                            trainingLocation: data.equipment.includes('full-gym') ? 'commercial-gym' : 'home-gym',
                            availableEquipment: data.equipment
                        }
                    });

                    // Save limitations
                    if (data.injuries.length > 0 && !data.injuries.includes('none')) {
                        await api.post('/onboarding/step/6', {
                            data: {
                                injuries: data.injuries.map(injury => ({
                                    bodyPart: injury,
                                    severity: 'moderate'
                                }))
                            }
                        });
                    }

                    // Complete onboarding and generate program
                    const result = await api.post('/onboarding/complete', {});

                    // Refresh user data
                    const userData = await api.get('/users/profile');
                    onComplete(userData.user || userData.data || userData);
                } catch (err) {
                    console.error('Onboarding error:', err);
                    // Still complete even if some steps fail
                    const userData = await api.get('/users/profile');
                    onComplete(userData.user || userData.data || userData);
                }
            };

            const renderStep = () => {
                switch(step) {
                    case 1: return <StepWelcome onNext={nextStep} />;
                    case 2: return <StepBasicInfo data={data} updateData={updateData} onNext={nextStep} onBack={prevStep} />;
                    case 3: return <StepGoal data={data} updateData={updateData} onNext={nextStep} onBack={prevStep} />;
                    case 4: return <StepExperience data={data} updateData={updateData} onNext={nextStep} onBack={prevStep} />;
                    case 5: return <StepFrequency data={data} updateData={updateData} onNext={nextStep} onBack={prevStep} />;
                    case 6: return <StepDuration data={data} updateData={updateData} onNext={nextStep} onBack={prevStep} />;
                    case 7: return <StepEquipment data={data} toggleArrayItem={toggleArrayItem} onNext={nextStep} onBack={prevStep} />;
                    case 8: return <StepInjuries data={data} toggleArrayItem={toggleArrayItem} updateData={updateData} onNext={nextStep} onBack={prevStep} />;
                    case 9: return <StepCurrentLifts data={data} updateData={updateData} onComplete={completeOnboarding} onBack={prevStep} loading={generating} />;
                    default: return null;
                }
            };

            if (generating) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="text-center">
                            <div className="text-6xl mb-6 animate-pulse">🏋️</div>
                            <h2 className="text-2xl font-bold text-white mb-2">Generating Your Program...</h2>
                            <p className="text-gray-400">Your AI coach is building a personalized training plan</p>
                            <div className="mt-8 w-64 h-2 bg-white/10 rounded-full mx-auto overflow-hidden">
                                <div className="h-full bg-orange-500 rounded-full animate-pulse" style={{width: '60%'}}></div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Progress Bar */}
                    {step > 1 && (
                        <div className="fixed top-0 left-0 right-0 h-1 bg-white/10 z-50">
                            <div
                                className="h-full bg-orange-500 transition-all duration-500"
                                style={{ width: `${progress}%` }}
                            />
                        </div>
                    )}

                    <div className="flex-1 flex items-center justify-center p-4">
                        {renderStep()}
                    </div>
                </div>
            );
        };

        // Onboarding Step Components
        const StepWelcome = ({ onNext }) => (
            <div className="text-center max-w-md">
                <div className="text-7xl mb-6 animate-float">⚡</div>
                <h1 className="text-3xl font-bold text-white mb-3 glow-text">Welcome to ClockWork</h1>
                <p className="text-gray-400 text-lg mb-8">AI-powered fitness coaching that adapts to you</p>
                <button
                    onClick={onNext}
                    className="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 px-12 rounded-xl text-lg transition-all glow"
                >
                    Get Started
                </button>
            </div>
        );

        const StepBasicInfo = ({ data, updateData, onNext, onBack }) => (
            <div className="w-full max-w-md">
                <h2 className="text-2xl font-bold text-white mb-2">Tell us about yourself</h2>
                <p className="text-gray-400 mb-6">This helps personalize your experience</p>

                <div className="space-y-4">
                    <div>
                        <label className="text-gray-400 text-sm">First Name</label>
                        <input
                            type="text"
                            value={data.firstName}
                            onChange={(e) => updateData('firstName', e.target.value)}
                            className="w-full mt-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:border-orange-500 focus:outline-none"
                            placeholder="Your name"
                        />
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <label className="text-gray-400 text-sm">Age (optional)</label>
                            <input
                                type="number"
                                value={data.age}
                                onChange={(e) => updateData('age', e.target.value)}
                                className="w-full mt-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:border-orange-500 focus:outline-none"
                                placeholder="Age"
                            />
                        </div>
                        <div>
                            <label className="text-gray-400 text-sm">Gender (optional)</label>
                            <select
                                value={data.gender}
                                onChange={(e) => updateData('gender', e.target.value)}
                                className="w-full mt-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:border-orange-500 focus:outline-none"
                            >
                                <option value="">Select</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label className="text-gray-400 text-sm">Current Weight</label>
                        <div className="flex gap-2 mt-1">
                            <input
                                type="number"
                                value={data.weight}
                                onChange={(e) => updateData('weight', e.target.value)}
                                className="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:border-orange-500 focus:outline-none"
                                placeholder="Weight"
                            />
                            <select
                                value={data.weightUnit}
                                onChange={(e) => updateData('weightUnit', e.target.value)}
                                className="bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:border-orange-500 focus:outline-none"
                            >
                                <option value="lb">lb</option>
                                <option value="kg">kg</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div className="flex gap-3 mt-8">
                    <button onClick={onBack} className="flex-1 border border-white/20 text-white py-3 rounded-xl hover:bg-white/10">
                        Back
                    </button>
                    <button onClick={onNext} className="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl glow">
                        Continue
                    </button>
                </div>
            </div>
        );

        const StepGoal = ({ data, updateData, onNext, onBack }) => {
            const goals = [
                { id: 'build-muscle', label: 'Build Muscle', icon: '💪', desc: 'Hypertrophy focus' },
                { id: 'build-strength', label: 'Get Stronger', icon: '🏋️', desc: 'Strength focus' },
                { id: 'lose-fat', label: 'Lose Fat', icon: '🔥', desc: 'Deficit + training' },
                { id: 'general-health', label: 'Improve Fitness', icon: '❤️', desc: 'General health' },
                { id: 'sport-performance', label: 'Train for Sport', icon: '⚽', desc: 'Sport-specific' },
                { id: 'competition-prep', label: 'Competition Prep', icon: '🏆', desc: 'Powerlifting/BB' }
            ];

            return (
                <div className="w-full max-w-md">
                    <h2 className="text-2xl font-bold text-white mb-2">What's your main goal?</h2>
                    <p className="text-gray-400 mb-6">This shapes your entire program</p>

                    <div className="space-y-3">
                        {goals.map(goal => (
                            <button
                                key={goal.id}
                                onClick={() => updateData('goal', goal.id)}
                                className={`w-full flex items-center gap-4 p-4 rounded-xl border transition-all ${
                                    data.goal === goal.id
                                        ? 'border-orange-500 bg-orange-500/20'
                                        : 'border-white/20 bg-white/5 hover:bg-white/10'
                                }`}
                            >
                                <span className="text-2xl">{goal.icon}</span>
                                <div className="text-left">
                                    <div className="text-white font-medium">{goal.label}</div>
                                    <div className="text-gray-400 text-sm">{goal.desc}</div>
                                </div>
                                {data.goal === goal.id && (
                                    <span className="ml-auto text-orange-500">✓</span>
                                )}
                            </button>
                        ))}
                    </div>

                    <div className="flex gap-3 mt-8">
                        <button onClick={onBack} className="flex-1 border border-white/20 text-white py-3 rounded-xl hover:bg-white/10">
                            Back
                        </button>
                        <button
                            onClick={onNext}
                            disabled={!data.goal}
                            className="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl glow disabled:opacity-50"
                        >
                            Continue
                        </button>
                    </div>
                </div>
            );
        };

        const StepExperience = ({ data, updateData, onNext, onBack }) => {
            const levels = [
                { id: 'complete-beginner', label: 'New to Training', desc: '0-6 months', icon: '🌱' },
                { id: 'beginner', label: 'Some Experience', desc: '6 months - 2 years', icon: '🌿' },
                { id: 'intermediate', label: 'Experienced', desc: '2-5 years', icon: '🌳' },
                { id: 'advanced', label: 'Advanced', desc: '5+ years', icon: '🏔️' }
            ];

            return (
                <div className="w-full max-w-md">
                    <h2 className="text-2xl font-bold text-white mb-2">How long have you been training?</h2>
                    <p className="text-gray-400 mb-6">This determines program complexity</p>

                    <div className="space-y-3">
                        {levels.map(level => (
                            <button
                                key={level.id}
                                onClick={() => updateData('experience', level.id)}
                                className={`w-full flex items-center gap-4 p-4 rounded-xl border transition-all ${
                                    data.experience === level.id
                                        ? 'border-orange-500 bg-orange-500/20'
                                        : 'border-white/20 bg-white/5 hover:bg-white/10'
                                }`}
                            >
                                <span className="text-2xl">{level.icon}</span>
                                <div className="text-left">
                                    <div className="text-white font-medium">{level.label}</div>
                                    <div className="text-gray-400 text-sm">{level.desc}</div>
                                </div>
                                {data.experience === level.id && (
                                    <span className="ml-auto text-orange-500">✓</span>
                                )}
                            </button>
                        ))}
                    </div>

                    <div className="flex gap-3 mt-8">
                        <button onClick={onBack} className="flex-1 border border-white/20 text-white py-3 rounded-xl hover:bg-white/10">
                            Back
                        </button>
                        <button
                            onClick={onNext}
                            disabled={!data.experience}
                            className="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl glow disabled:opacity-50"
                        >
                            Continue
                        </button>
                    </div>
                </div>
            );
        };

        const StepFrequency = ({ data, updateData, onNext, onBack }) => {
            const frequencies = [

        const CoachTab = ({ user }) => {
            const [messages, setMessages] = useState([
                { role: 'assistant', content: `Hey ${user?.name?.split(' ')[0] || 'there'}! I'm your AI coach. Ask me anything about training, nutrition, or recovery.` }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const sendMessage = async () => {
                if (!input.trim() || loading) return;

                const userMessage = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
                setLoading(true);

                try {
                    const data = await api.post('/ai-coach/ask', { question: userMessage });
                    setMessages(prev => [...prev, {
                        role: 'assistant',
                        content: data.answer || data.response || 'I had trouble processing that. Try rephrasing?'
                    }]);
                } catch (err) {
                    setMessages(prev => [...prev, {
                        role: 'assistant',
                        content: "I'm having trouble connecting right now. Please try again in a moment."
                    }]);
                }
                setLoading(false);
            };

                'Modify my workout',
                "I'm feeling sore",
                'Nutrition tips',
                'Help me progress'

                {/* PRs */}
                <div className="glass rounded-2xl p-6">
                    <h2 className="text-lg font-semibold text-white mb-4">Personal Records</h2>
                    <div className="space-y-3">
                        {['Squat', 'Bench Press', 'Deadlift'].map(lift => (
                            <div key={lift} className="flex items-center justify-between py-2 border-b border-white/10 last:border-0">
                                <span className="text-gray-300">{lift}</span>
                                <span className="text-orange-500 font-medium">--</span>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        // ═══════════════════════════════════════════════════════════
        // PROFILE TAB
        // ═══════════════════════════════════════════════════════════
        const ProfileTab = ({ user, onLogout }) => (
            <div className="space-y-6">
                {/* Profile Header */}
                <div className="text-center">
                    <div className="w-20 h-20 rounded-full bg-orange-500/20 flex items-center justify-center mx-auto mb-3">
                        <span className="text-3xl">💪</span>
                    </div>
                    <h1 className="text-xl font-bold text-white">{user?.name || 'Athlete'}</h1>
                    <p className="text-gray-400">{user?.email}</p>
                    <span className="inline-block mt-2 px-3 py-1 rounded-full bg-green-500/20 text-green-400 text-sm">
                        {user?.userType || 'Individual'}
                    </span>
                </div>

                {/* Settings */}
                <div className="glass rounded-2xl divide-y divide-white/10">
                    <button className="w-full flex items-center justify-between p-4 text-left hover:bg-white/5 transition-colors">
                        <span className="text-white">Edit Profile</span>
                        <i className="fas fa-chevron-right text-gray-500"></i>
                    </button>
                    <button className="w-full flex items-center justify-between p-4 text-left hover:bg-white/5 transition-colors">
                        <span className="text-white">Subscription</span>
                        <span className="text-orange-500">{user?.subscription?.tier || 'Free'}</span>
                    </button>
                    <button className="w-full flex items-center justify-between p-4 text-left hover:bg-white/5 transition-colors">
                        <span className="text-white">Connect Wearables</span>
                        <i className="fas fa-chevron-right text-gray-500"></i>
                    </button>
                    <button className="w-full flex items-center justify-between p-4 text-left hover:bg-white/5 transition-colors">
                        <span className="text-white">Notifications</span>
                        <i className="fas fa-chevron-right text-gray-500"></i>
                    </button>
                </div>

                {/* Logout */}
                <button
                    onClick={onLogout}
                    className="w-full py-3 text-red-400 hover:text-red-300 transition-colors"
                >
                    Sign Out
                </button>

                {/* App Info */}
                <div className="text-center text-gray-500 text-sm">
                    <p>ClockWork v3.0</p>
                    <p className="mt-1">AI-Powered Fitness Coaching</p>
                </div>
            </div>
        );

        // ═══════════════════════════════════════════════════════════
        // RENDER APP
        // ═══════════════════════════════════════════════════════════
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
